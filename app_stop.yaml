- name: APP Stop
  hosts: all
  gather_facts: false

  vars:
    instance: "{{ instance }}"

  vars_files:
    - config/{{ instance }}.yaml

  tasks:
    - name: Stop services
      shell: |
        . {{ APP_BASE }}/{{ APP_ENV }} run
        echo {{ TGT_WEBLOGIC_PASS }} | $ADMIN_SCRIPTS_HOME/adstpall.sh apps/{{ TGT_APPS_PASS }} 
      args:
        executable: /bin/bash
      register: stop_services_result
      ignore_errors: yes

    - name: Check if services stopped successfully
      set_fact:
        services_stopped: >-
          {{
            'All enabled services on this node are stopped.'
            in (stop_services_result.stdout + stop_services_result.stderr)
          }}

    - name: Wait for 2 minutes
      pause:
        minutes: 2
      when: services_stopped

    - name: Check for remaining EBS processes
      shell: |
        ps -ef | egrep "FNDSM|FNDLIBR|frmweb|oacore|forms|Apache|httpd|NodeManager|weblogic.Server" | grep -v grep
      register: process_check
      changed_when: false
      ignore_errors: yes
      when: services_stopped

    - name: Kill remaining EBS processes
      shell: |
        ps -ef | egrep "FNDSM|FNDLIBR|frmweb|oacore|forms|Apache|httpd|NodeManager|weblogic.Server" | grep -v grep | awk '{print $2}' | xargs -r kill -9
      register: kill_result
      ignore_errors: yes
      when:
        - services_stopped
        - process_check.stdout | trim != ""

    - name: Verify all EBS processes are stopped
      shell: |
        ps -ef | egrep "FNDSM|FNDLIBR|frmweb|oacore|forms|Apache|httpd|NodeManager|weblogic.Server" | grep -v grep
      register: verify_processes
      changed_when: false
      failed_when: verify_processes.stdout | trim != ""
      when: services_stopped
