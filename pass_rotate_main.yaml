- name: Rotate passwords for each inventory group
  hosts: all
  gather_facts: no
  run_once: true

  vars_files:
    - vars/variables.yaml

  tasks:
    - name: Parse secret_name into group and user
      set_fact:
        group_name: "{{ item.secret_name.rsplit('_', 1)[0] }}"
        user_name: "{{ item.secret_name.rsplit('_', 1)[1] | lower }}"
        secret_name: "{{ item.secret_name }}"
        email_recipients: "{{ item.email_recipients }}"
      loop: "{{ users }}"

    - name: Include fetch_existing_pwd role
      include_role:
        name: 1fetch_existing_pwd

