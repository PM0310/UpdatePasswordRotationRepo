- name: Rotate passwords for each inventory group
  hosts: all
  gather_facts: no
  run_once: true

  tasks:

    - name: Debug - Show ansible_limit
      debug:
        msg: "Ansible limit: {{ ansible_limit | default('Not Defined') }}"

    - name: Extract valid groups from ansible_limit
      set_fact:
        limited_groups: "{{ ansible_limit.split(',') | map('trim') | select('in', groups.keys()) | list }}"

    - name: Debug - Show only groups in the limit
      debug:
        msg: "Processing inventory groups: {{ limited_groups }}"

    - name: Debug - Show hosts in each selected group
      debug:
        msg: "Hosts in group {{ item }}: {{ groups[item] }}"
      loop: "{{ limited_groups }}"

    - name: Generate passwords for each group and store in a dictionary
      set_fact:
        group_passwords: "{{ group_passwords | default({}) | combine({ item: lookup('password', '/dev/null length=16') }) }}"
      loop: "{{ limited_groups }}"

    - name: Store group passwords globally
      add_host:
        name: "global_passwords"
        group_pwds: "{{ group_passwords }}"
      run_once: true

    - name: Debug - Show stored passwords dictionary
      debug:
        var: hostvars['global_passwords'].group_pwds
      run_once: true

    - name: Debug - Show generated passwords per group
      debug:
        msg: "{{ hostvars['global_passwords']['group_pwds'] }}"
      run_once: true

