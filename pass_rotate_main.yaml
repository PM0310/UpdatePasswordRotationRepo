- name: Rotate passwords for each inventory group
  hosts: all
  gather_facts: no
  run_once: true

  tasks:

    - name: Debug - Show ansible_limit
      debug:
        msg: "Ansible limit: {{ ansible_limit | default('Not Defined') }}"


    # - name: Filter only the groups that contain hosts in this play
    #   set_fact:
    #     limited_groups: "{{ groups.keys() | difference(['all', 'ungrouped']) | select('match', '^.*') | select('in', ansible_limit.split(',')) | list }}"

    - name: Normalize ansible_limit and extract valid groups
      set_fact:
        limited_groups: "{{ ansible_limit.split(',') | map('trim') | select('in', groups.keys()) | list }}"


    - name: Debug - Show only groups in the limit
      debug:
        msg: "Processing inventory groups: {{ limited_groups }}"

    - name: Debug - Show hosts in each selected group
      debug:
        msg: "Hosts in group {{ item }}: {{ groups[item] }}"
      loop: "{{ limited_groups }}"

    # - name: Generate passwords for each group and store in a dictionary
    #   set_fact:
    #     group_passwords: "{{ hostvars['localhost'].get('group_passwords', {}) | combine({ item: lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }) }}"
    #   loop: "{{ limited_groups }}"
    #   loop_control:
    #     loop_var: item
    #   delegate_to: localhost
    #   run_once: true

    - name: Generate passwords for each group and store in a dictionary
      set_fact:
        group_passwords: >-
          {{
            group_passwords | default({}) |
            combine({item: lookup('password', '/dev/null length=16')})
          }}
      with_items: "{{ limited_groups }}"


    - name: Debug - Show generated passwords per group
      debug:
        msg: "Generated password for group {{ item }}: {{ hostvars['localhost']['group_passwords'][item] }}"
      loop: "{{ limited_groups }}"
      loop_control:
        loop_var: item



