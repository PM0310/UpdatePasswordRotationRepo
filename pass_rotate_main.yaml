- name: Rotate passwords for inventory groups
  hosts: "{{ target_groups }}"
  gather_facts: no
  serial: 1

  vars_files:
    - vars/variables.yaml

  tasks:
    - name: Loop through each host to access group vars
      include_tasks: tasks/group_rotate_wrapper.yaml
      loop: "{{ ansible_play_hosts }}"
      loop_control:
        loop_var: group_ref_host
      run_once: true




