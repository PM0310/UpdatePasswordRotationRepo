- name: Rotate passwords for each inventory group
  hosts: all
  gather_facts: no
  run_once: true

  tasks:
    - name: Filter only the groups that contain hosts in this play
      set_fact:
        limited_groups: "{{ groups.keys() | select('search', '^(?!all$|ungrouped$)') | select('in', ansible_play_hosts | map('extract', hostvars, 'group_names') | list) | list }}"

    - name: Debug - Show only groups in the limit
      debug:
        msg: "Processing inventory groups: {{ limited_groups }}"

    - name: Debug - Show hosts in each selected group
      debug:
        msg: "Hosts in group {{ item }}: {{ groups[item] }}"
      loop: "{{ limited_groups }}"

    - name: Generate passwords for each group and store in a dictionary
      set_fact:
        group_passwords: "{{ hostvars['localhost'].get('group_passwords', {}) | combine({ item: lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }) }}"
      loop: "{{ limited_groups }}"
      loop_control:
        loop_var: item
      delegate_to: localhost
      run_once: true

    - name: Debug - Show generated passwords per group
      debug:
        msg: "Generated password for group {{ item }}: {{ hostvars['localhost']['group_passwords'][item] }}"
      loop: "{{ limited_groups }}"
      loop_control:
        loop_var: item

