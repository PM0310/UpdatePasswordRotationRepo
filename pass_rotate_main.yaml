- name: Fetch a password from Secret Server, reset password on target hosts, and send email
  hosts: all
  gather_facts: false
  
  vars_files:
    - vars/variables.yaml
  

  tasks:
      - name: Restrict password rotation to root and service accounts
        block:
          - name: List all users received from variables
            debug:
              msg: "Received user: {{ item.username }}"
            loop: "{{ users }}"

          - name: Filter allowed users
            set_fact:
              filtered_users: "{{ users | selectattr('username', 'in', allowed_users) | list }}"

          - name: Debug filtered users
            debug:
              msg: "Filtered user: {{ item.username }}"
            loop: "{{ filtered_users }}"
            
          - name: Process filtered users for password rotation
            include_tasks: tasks/user_password_rotate.yaml
            loop: "{{ filtered_users }}"
            loop_control:
              loop_var: user_details

        # vars:
