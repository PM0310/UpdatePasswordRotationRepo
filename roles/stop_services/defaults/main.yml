---
# EBS process patterns to monitor and manage
ebs_process_patterns: "FNDSM|FNDLIBR|frmweb|oacore|forms|Apache|httpd|NodeManager|weblogic.Server"

# Configuration
pause_duration_minutes: 2
force_kill_timeout: 9

# Logging configuration - log_dir should be defined in config file
log_timestamp: "{{ current_date }}"
stop_services_log: "{{ log_dir }}/stop_services_{{ log_timestamp }}.log"
