- block:
    - name: Update password for target Oracle user on CDB
      shell: |
        source {{ ORACLE_HOME }}/{{ CDB_ENV }}
        sqlplus -s / as sysdba <<EOF
        WHENEVER SQLERROR EXIT FAILURE
        SET FEEDBACK OFF
        ALTER USER {{ rotation_item.user_details['user'] | upper }} IDENTIFIED BY "{{ rotation_item.generated_password }}";
        EXIT;
        EOF
      args:
        executable: /bin/bash
      register: cdb_update_result
      failed_when: cdb_update_result.rc != 0 or 'ORA-' in cdb_update_result.stdout
      when: rotation_item.user_details['db_type'] == 'CDB'
      delegate_to: "{{ target_host }}"

    - name: Update password for target Oracle user on PDB
      shell: |
        source {{ ORACLE_HOME }}/{{ PDB_ENV }}
        sqlplus -s / as sysdba <<EOF
        WHENEVER SQLERROR EXIT FAILURE
        SET FEEDBACK OFF
        ALTER SESSION SET CONTAINER=EBS_PDB;
        ALTER USER {{ rotation_item.user_details['user'] | upper }} IDENTIFIED BY "{{ rotation_item.generated_password }}";
        EXIT;
        EOF
      args:
        executable: /bin/bash
      register: pdb_update_result
      failed_when: pdb_update_result.rc != 0 or 'ORA-' in pdb_update_result.stdout
      when: rotation_item.user_details['db_type'] == 'PDB'
      delegate_to: "{{ target_host }}"

    - name: Validate new Oracle password
      shell: |
        source {{ ORACLE_HOME }}/{{ (rotation_item.user_details['db_type'] == 'CDB') | ternary(CDB_ENV, PDB_ENV) }}
        sqlplus -s "{{ rotation_item.user_details['user'] | upper }}/{{ rotation_item.generated_password }}@EBSTRGT" as sysdba <<EOF
        WHENEVER SQLERROR EXIT FAILURE
        SET FEEDBACK OFF
        EXIT;
        EOF
      args:
        executable: /bin/bash
      register: validation
      failed_when: validation.rc != 0 or 'ORA-' in validation.stdout or 'Enter user-name' in validation.stdout
      changed_when: false
      delegate_to: "{{ target_host }}"

    - name: Mark rollback success on {{ target_host }}
      set_fact:
        rollback_db_success: "{{ rollback_db_success and true }}"

  rescue: 
    - name: Capture DB failure message on {{ target_host }}
      set_fact:
        db_success: false
        error_msg_db: "{{ ansible_failed_result.msg | default(ansible_failed_result.stderr) }}"