- block:

    - name: Apply phase
      include_tasks: "{{ role_path }}/tasks/strategies/apps/apply.yml"

    - name: Post phase
      include_tasks: "{{ role_path }}/tasks/strategies/apps/post.yml"
      when: rotation_item.apply_success

    - name: Validate phase
      include_tasks: "{{ role_path }}/tasks/strategies/apps/validate.yml"
      when: rotation_item.post_success

  rescue:

    - name: Capture failure
      set_fact:
        rotation_item: >-
          {{ rotation_item | combine({
            'apply_success': false,
            'error_messages': rotation_item.error_messages + ['Apply phase failed']
          }) }}
          
  rescue:
    - name: Capture credential rotation failure on {{ target_host }}
      set_fact:
        ebs_success: false
        error_messages_ebs: >-
          {{
            error_messages_ebs + [
              (ansible_failed_result.msg
               | default(ansible_failed_result.stderr
               | default('Unknown error')))
            ]
          }}