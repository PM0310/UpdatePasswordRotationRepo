- block:
    - name: Include apply strategy for {{ rotation_item.rotation_strategy }}
      include_tasks: "{{ role_path }}/tasks/strategies/{{ rotation_item.rotation_strategy }}/apply.yml"

    - name: Include validate strategy for {{ rotation_item.rotation_strategy }}
      include_tasks: "{{ role_path }}/tasks/strategies/{{ rotation_item.rotation_strategy }}/validate.yml"

  rescue:
    - name: Capture EBS failure on {{ target_host }}
      set_fact:
        ebs_success: false
        error_messages_ebs: >-
          {{
            error_messages_ebs + [
              (ansible_failed_result.msg
               | default(ansible_failed_result.stderr
               | default('Unknown error')))
            ]
          }}