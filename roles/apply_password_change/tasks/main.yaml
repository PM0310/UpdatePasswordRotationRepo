---
- name: Initialize password change results
  set_fact:
    password_change_results: []

- name: Normalize ansible_limit and extract target groups
  set_fact:
    target_groups: "{{ ansible_limit.split(',') | map('trim') | list }}"
  when: ansible_limit is defined

- name: Apply password change for each group
  include_tasks: process_group.yml
  loop: "{{ target_groups }}"
  loop_control:
    loop_var: group_name

- name: Show password change results
  debug:
    var: password_change_results
