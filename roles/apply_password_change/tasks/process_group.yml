---
- name: Debug primary variable
  debug:
    msg: "Host={{ item }}, primary={{ hostvars[item].primary | default('NOT_DEFINED') }}"
  loop: "{{ groups[group_name] }}"
  
- name: Find primary host in {{ group_name }}
  set_fact:
    target_host: "{{ item }}"
  loop: "{{ groups[group_name] }}"
  when: hostvars[item].primary | default(false) | bool

- name: Verify primary host found
  fail:
    msg: "No Primary:true host found in {{ group_name }}"
  when: target_host is not defined

- name: Resolve OLAM variable names
  set_fact:
    apps_password: >-
      {{ lookup('vars', hostvars[target_host].olam_fields.apps_pass) }}

    system_password: >-
      {{ lookup('vars', hostvars[target_host].olam_fields.system_pass) }}

    target_password: >-
      {{ lookup('vars', hostvars[target_host].olam_fields.apps_pass_gen) }}

- block:

    - name: Change APPS password using FNDCPASS
      shell: |
        source {{ hostvars[target_host].EBS_ENV_FILE }} run

        FNDCPASS \
        apps/{{ apps_password }} \
        0 Y \
        system/{{ system_password }} \
        SYSTEM APPLSYS \
        {{ target_password }}
      args:
        executable: /bin/bash
      register: fndcpass_result
      delegate_to: "{{ target_host }}"
      become: yes
      become_user: "{{ hostvars[target_host].ebs_owner }}"
      failed_when: >
        fndcpass_result.rc != 0 or
        'ORA-' in fndcpass_result.stdout or
        'ERROR' in fndcpass_result.stdout

    - name: Record success
      set_fact:
        group_result:
          group: "{{ group_name }}"
          target_host: "{{ target_host }}"
          password_success: true
          error_message: ""

  rescue:

    - name: Record failure
      set_fact:
        group_result:
          group: "{{ group_name }}"
          target_host: "{{ target_host }}"
          password_success: false
          error_message: "{{ ansible_failed_result.msg | default('FNDCPASS failed') }}"

  always:

    - name: Append group result
      set_fact:
        password_change_results: >-
          {{
            password_change_results + [group_result]
          }}
