- name: "DEBUG: Inventory limit passed by OLAM"
  debug:
    msg: "Processing host: {{ inventory_hostname }} | Groups: {{ group_names }}"

- name: "Set primary group (assuming 1 group per host)"
  set_fact:
    user_group: "{{ group_names[0] }}"

- name: "DEBUG: User group determined"
  debug:
    msg: "Primary group selected: {{ user_group }}"

# - name: "DEBUG: Secret Name passed from inventory"
#   debug:
#     msg: "Group: {{ user_group }}, Secret Name: {{ secret_name }}"


###

- name: Debug - Show extracted user details
  debug:
    msg: "Group: {{ user_group }}, Username: {{ user_details.username }}, Secret Name: {{ user_details.secret_name }}, Email Recipients: {{ user_details.email_recipients }}"

###

- name: Set Secret Server lookup URL
  set_fact:
    api_url: "{{ secret_server_base_url }}/api/v1/secrets?filter.searchField=name&filter.searchText={{ user_details.secret_name }}"
    tkn: "{{ tkn }}"

- name: Retrieve matching secrets
  uri:
    url: "{{ api_url }}"
    method: GET
    headers:
      Authorization: "Bearer {{ tkn }}"
    return_content: yes
  register: secrets_found
  delegate_to: localhost

- name: Debug API response
  debug:
    var: secrets_found.json

- name: Find the ID for the specified secret_name
  set_fact:
    found_secret_id: "{{ secrets_found.json.records | selectattr('name', 'equalto', secret_name) | map(attribute='id') | list | first }}"

- name: Debug found_secret_id
  debug:
    msg: "Secret ID found: {{ found_secret_id }} for secret_name: {{ user_details.secret_name }}"

- name: Set API URL to get secret details using found_secret_id
  set_fact:
    api_url2: "{{ secret_server_base_url }}/api/v1/secrets/{{ found_secret_id }}"

- name: Retrieve existing secret
  uri:
    url: "{{ api_url2 }}"
    method: GET
    headers:
      Authorization: "Bearer {{ tkn }}"
    return_content: yes
  register: existing_secret
  delegate_to: localhost

- name: Set variables from secret details
  set_fact:
    site_id: "{{ existing_secret.json['siteId'] }}"
    folder_id: "{{ existing_secret.json['folderId'] }}"
    field_id: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first).fieldId }}"
    item_id: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first).itemId }}"
    existing_pwd: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first).itemValue }}"
    secret_id: "{{ existing_secret.json['id'] }}"
    comment: "Updating password for secret: {{ secret_name }}"

- name: Debug - Show secret details before update
  debug:
    msg: "Updating Secret Name: {{ user_details.secret_name }}, Secret ID: {{ secret_id }}, Group: {{ user_group }}"


