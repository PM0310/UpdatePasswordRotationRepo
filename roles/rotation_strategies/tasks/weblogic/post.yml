---
- block:
    - name: Derive target password
      set_fact:
        target_password: >-
          {{
            rotation_item.generated_password
            if operation_type == 'rotate'
            else rotation_item.retrieved_password
          }}

        previous_password: >-
          {{
            rotation_item.retrieved_password
            if operation_type == 'rotate'
            else rotation_item.generated_password
          }}
    
    - name: Determine app tier hosts (list, group, multi‑node or single‑node)
      set_fact:
        app_tier_hosts: >-
          {{
            (hostvars[target_host].app_tier_group | type_debug == 'list')
            | ternary(
                hostvars[target_host].app_tier_group,
                groups[hostvars[target_host].app_tier_group]
                if hostvars[target_host].app_tier_group is string
                and hostvars[target_host].app_tier_group in groups
                else [target_host]
            )
          }}

    - name: Stop Admin Server
      shell: |
        . {{ hostvars[target_host].EBS_ENV_FILE }}

        $ADMIN_SCRIPTS_HOME/adadminsrvctl.sh stop
      args:
        executable: /bin/bash
      delegate_to: "{{ target_host }}"
      register: admin_server_stop_result
      failed_when: admin_server_stop_result.rc != 0

    - name: Start all EBS services
      shell: |
        . {{ hostvars[target_host].EBS_ENV_FILE }}

        $ADMIN_SCRIPTS_HOME/adstrtal.sh apps/{{ rotation_item.dependent_passwords.apps_password }}
      args:
        executable: /bin/bash
      delegate_to: "{{ dependent_host }}"
      loop: "{{ app_tier_hosts }}"
      loop_control:
        loop_var: dependent_host
      register: start_services_result
      failed_when: start_services_result.rc != 0

    - name: Mark post success
      set_fact:
        post_success: true

  rescue:

    - name: Mark post failure
      set_fact:
        post_success: false
        post_errors: >-
          {{
            post_errors | default([])
            + [ansible_failed_result.msg | default('WebLogic post failed')]
          }}