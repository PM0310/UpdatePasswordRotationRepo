---
- block:

    - name: Derive validation password
      set_fact:
        target_password: >-
          {{
            rotation_item.generated_password
            if operation_type == 'rotate'
            else rotation_item.retrieved_password
          }}

    - name: Validate WebLogic login using WLST
      shell: |
        . {{ hostvars[target_host].EBS_ENV_FILE }}

        $FMW_HOME/oracle_common/common/bin/wlst.sh <<EOF > /tmp/wls_validate.log
        try:
            connect(
                '{{ hostvars[target_host].wls_admin_user }}',
                '{{ target_password }}',
                '{{ hostvars[target_host].wls_admin_url }}'
            )
            print('VALID')
            disconnect()
        except:
            print('INVALID')
            exit()
        EOF

        cat /tmp/wls_validate.log
      args:
        executable: /bin/bash
      delegate_to: "{{ target_host }}"
      register: weblogic_validate_result
      changed_when: false
      failed_when: "'VALID' not in weblogic_validate_result.stdout"

    - name: Mark validate success
      set_fact:
        validate_success: true

  rescue:

    - name: Mark validate failure
      set_fact:
        validate_success: false

        validate_errors: >-
          {{
            validate_errors + [{
              'msg': ansible_failed_result.msg | default('WebLogic validation failed')
            }]
          }}

    - fail:
        msg: "WebLogic validation phase failed"