---
- block:
    - name: Get app tier hosts from group (host var app_tier_group)
      set_fact:
        app_tier_hosts: "{{ groups[hostvars[inventory_hostname].app_tier_group] }}"

    - name: Run AutoConfig on all application tier nodes
      shell: |
        source {{ hostvars[inventory_hostname].EBS_ENV_FILE }}
        {{ hostvars[inventory_hostname].ADMIN_SCRIPTS_HOME }}/adautocfg.sh
      args:
        executable: /bin/bash
      register: autoconfig_result
      failed_when: autoconfig_result.rc != 0
      delegate_to: "{{ item }}"
      loop: "{{ app_tier_hosts }}"

    - name: Update WLS datasource password (run once on first node)
      shell: |
        source {{ hostvars[inventory_hostname].EBS_ENV_FILE }}
        perl $FND_TOP/patch/115/bin/txkManageDBConnectionPool.pl <<EOF
        updateDSPassword
        apps
        {{ target_password }}
        EOF
      args:
        executable: /bin/bash
      register: ds_update
      failed_when: ds_update.rc != 0
      delegate_to: "{{ app_tier_hosts[0] }}"
      run_once: true

    - name: Restart application services (optional)
      block:
        - name: Stop all services
          shell: |
            source {{ hostvars[inventory_hostname].EBS_ENV_FILE }}
            { echo "apps"; echo "{{ target_password }}"; echo "{{ system_password }}"; } | adstpall.sh apps@{{ hostvars[inventory_hostname].DB_SID }}
          args:
            executable: /bin/bash
          delegate_to: "{{ item }}"
          loop: "{{ app_tier_hosts }}"

        - name: Start all services
          shell: |
            source {{ hostvars[inventory_hostname].EBS_ENV_FILE }}
            { echo "apps"; echo "{{ target_password }}"; echo "{{ system_password }}"; } | adstrtal.sh apps@{{ hostvars[inventory_hostname].DB_SID }}
          args:
            executable: /bin/bash
          delegate_to: "{{ item }}"
          loop: "{{ app_tier_hosts }}"
      when: restart_services | default(false)

    - name: Mark post success
      set_fact:
        rotation_item: "{{ rotation_item | combine({'post_success': true}) }}"

  rescue:
    - name: Capture post failure
      set_fact:
        rotation_item: >-
          {{ rotation_item | combine({
            'post_success': false,
            'error_messages': rotation_item.error_messages | default([]) + ['Post phase failed']
          }) }}
  when: rotation_item.apply_success | default(false) and operation_type == 'rotate'