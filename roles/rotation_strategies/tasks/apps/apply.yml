- block:
  - name: Ensure SYSTEM password is available
    assert:
      that:
        - rotation_item.dependent_passwords.system_password is defined
        - rotation_item.dependent_passwords.system_password | length > 0
      fail_msg: "SYSTEM password missing for APPS rotation item {{ rotation_item.user_details.secret_name }}"

  - name: Derive passwords
    set_fact:
      target_password: "{{ rotation_item.generated_password if operation_type == 'rotate' else rotation_item.retrieved_password }}"
      appsuser_password: "{{ rotation_item.retrieved_password if operation_type == 'rotate' else rotation_item.generated_password }}"
      system_password: "{{ rotation_item.dependent_passwords.system_password }}"

  - name: Change APPS password using FNDCPASS
    shell: |
      cd /tmp
      source {{ hostvars[target_host].EBS_ENV_FILE }} run
      FNDCPASS apps/{{ appsuser_password }} 0 Y system/{{ system_password }} SYSTEM APPLSYS {{ target_password }}
    args:
      executable: /bin/bash
    register: apps_pwd_change
  #  no_log: true
    failed_when: apps_pwd_change.rc != 0 or 'ORA-' in apps_pwd_change.stdout or 'ERROR' in apps_pwd_change.stdout
    delegate_to: "{{ target_host }}"
    become: yes
    become_user: "{{ hostvars[target_host].ebs_owner }}"

  - name: Mark apply success
    set_fact:
      rotation_item: "{{ rotation_item | combine({'apply_success': true}) }}"

  rescue:
    - name: Set apply_success false and record error
      set_fact:
        rotation_item: "{{ rotation_item | combine({'apply_success': false, 'apply_error': ansible_failed_result.msg | default('Unknown error')}) }}"
    - name: Propagate failure to outer rescue
      fail:
        msg: "Apply phase failed: {{ rotation_item.apply_error }}"