# process_host.yml – processes a single host for a given rotation_item
# Expected variables from caller:
#   - rotation_item   : the current rotation item (immutable loop variable)
#   - current_host    : the target host IP/hostname
#   - operation_type  : 'rotate' or 'rollback'
#   - processed_hosts : a list defined in the caller (initially empty) that will collect results

- name: Initialize phase outcome variables for {{ current_host }}
  set_fact:
    # Phase‑specific flags (common to both operations)
    apply_success: false
    apply_errors: []
    post_success: false
    post_errors: []
    validate_success: false
    validate_errors: []
    
- name: Initialize phase outcome variables for {{ current_host }} for rotation phase
  set_fact:
    rotation_success: true
    rotation_errors: []
  when: operation_type | default('rotate') == 'rotate'

- name: Initialize phase outcome variables for {{ current_host }} for rollback phase
  set_fact:
    rollback_success: true
    rollback_errors: []
  when: operation_type | default('rotate') == 'rollback'

- name: Apply operation on {{ current_host }}
  vars:
    target_host: "{{ current_host }}"
  block:
    - name: Apply phase
      include_tasks: "roles/rotation_strategies/tasks/{{ rotation_item.user_details.type }}/apply.yml"

    - name: Post phase
      include_tasks: "roles/rotation_strategies/tasks/{{ rotation_item.user_details.type }}/post.yml"

    - name: Validate phase
      include_tasks: "roles/rotation_strategies/tasks/{{ rotation_item.user_details.type }}/validate.yml"
  rescue:
    - name: Record error during rotation
      set_fact:
        rotation_success: false
        rotation_errors: >-
          {{ rotation_errors + [ {
              'host': current_host,
              'msg': ansible_failed_result.msg | default('Unknown error'),
              'apply_success': apply_success,
              'apply_errors': apply_errors,
              'post_success': post_success,
              'post_errors': post_errors,
              'validate_success': validate_success,
              'validate_errors': validate_errors
            } ] }}
      when: operation_type | default('rotate') == 'rotate'

    - name: Record error during rollback
      set_fact:
        rollback_success: false
        rollback_errors: >-
          {{ rollback_errors + [ {
              'host': current_host,
              'msg': ansible_failed_result.msg | default('Unknown error'),
              'apply_success': apply_success,
              'apply_errors': apply_errors,
              'post_success': post_success,
              'post_errors': post_errors,
              'validate_success': validate_success,
              'validate_errors': validate_errors
            } ] }}
      when: operation_type | default('rotate') == 'rollback'

  always:
    - name: Build final per-host item
      set_fact:
        processed_host_item: >-
          {{
            {
              'target_host': current_host,

              'apply_success': apply_success,
              'apply_errors': apply_errors,

              'post_success': post_success,
              'post_errors': post_errors,

              'validate_success': validate_success,
              'validate_errors': validate_errors,

              'rotation_success':
                rotation_success
                if operation_type == 'rotate'
                else false,

              'rotation_errors':
                rotation_errors
                if operation_type == 'rotate'
                else [],

              'rollback_success':
                rollback_success
                if operation_type == 'rollback'
                else false,

              'rollback_errors':
                rollback_errors
                if operation_type == 'rollback'
                else []
            }
          }}

    - name: Append to global processed_hosts list
      set_fact:
        processed_hosts: "{{ processed_hosts | default([]) + [processed_host_item] }}"