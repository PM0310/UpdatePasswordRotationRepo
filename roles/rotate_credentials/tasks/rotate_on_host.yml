- name: Initialize rotation flags (when operation is rotate)
  set_fact:
    rotation_success: true
    rotation_errors: []
  when: operation_type | default('rotate') == 'rotate'

- name: Initialize rollback flags (when operation is rollback)
  set_fact:
    rollback_success: true
    rollback_errors: []
  when: operation_type | default('rotate') == 'rollback'

- name: Process each host in {{ rotation_item.group }}
  include_tasks: process_host.yml
  loop: "{{ groups[rotation_item.group] }}"
  loop_control:
    loop_var: current_host

- name: Append results for {{ rotation_item.user_details.user }} (rotate)
  set_fact:
    updated_items: >-
      {{ updated_items + [ rotation_item | combine({
          'apply_success': rotation_success,
          'rotation_errors': rotation_errors
        }) ] }}
  when: operation_type | default('rotate') == 'rotate'

- name: Append results for {{ rotation_item.user_details.user }} (rollback)
  set_fact:
    updated_items: >-
      {{ updated_items + [ rotation_item | combine({
          'rollback_success': rollback_success,
          'rollback_errors': rollback_errors
        }) ] }}
  when: operation_type | default('rotate') == 'rollback'