---
# This task fetches a secret from Secret Server by its name.
# Required input variables:
#   - secret_name: name of the secret to fetch
#   - result_var: name of the variable to store the secret data (dict with 'id', 'password', 'full_json')
#
# Output: a fact named as 'result_var' containing:
#   - id: secret ID
#   - password: current password value
#   - full_json: the raw API response (for any extra fields)

- name: Set API URL for secret search
  set_fact:
    _search_url: "{{ secret_server_base_url }}/api/v1/secrets?filter.searchField=name&filter.searchText={{ current_secret_name }}"

- name: Search secrets on Secret Server
  uri:
    url: "{{ _search_url }}"
    method: GET
    headers:
      Authorization: "Bearer {{ tkn }}"
    return_content: yes
  register: _secrets_found
  delegate_to: localhost

- name: Extract secret ID
  set_fact:
    _secret_id: >-
      {{ (_secrets_found.json.records
           | selectattr('name','equalto', secret_name)
           | map(attribute='id')
           | list)[0] }}

- name: Fetch full secret details
  uri:
    url: "{{ secret_server_base_url }}/api/v1/secrets/{{ _secret_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ tkn }}"
    return_content: yes
  register: _secret_full
  delegate_to: localhost

- name: Extract password value
  set_fact:
    _password: >-
      {{ (_secret_full.json['items']
           | selectattr('slug','equalto','password')
           | first).itemValue }}

- name: Set the result variable
  set_fact:
    "{{ result_var }}": {
      'id': _secret_id,
      'password': _password,
      'full_json': _secret_full.json
    }