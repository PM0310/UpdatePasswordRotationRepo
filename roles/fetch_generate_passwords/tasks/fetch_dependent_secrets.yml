---
# This task fetches multiple dependent secrets and returns a dictionary.
# Required input variable:
#   - dependent_list: a dict mapping logical names to secret names (e.g., {system_password: "SYSTEM_PROD"})
#
# Output fact: dependent_passwords (dict) with logical names as keys and passwords as values.

- name: Initialize dependent_passwords dict
  set_fact:
    dependent_passwords: {}

- name: Fetch each dependent secret
  include_tasks: _fetch_one_dependent.yml
  loop: "{{ dependent_list | dict2items }}"
  loop_control:
    loop_var: dep_item

# The subtask _fetch_one_dependent.yml (in the same directory) – defined inline below.
# Alternatively, you can create a separate file; but for simplicity we embed it.

- name: Helper task – fetch one dependent secret
  set_fact:
    _fetch_one_dependent_defined: true