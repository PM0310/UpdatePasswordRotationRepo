---
- name: Debug – verifying secret_name & group_name
  debug:
    msg: "Secret: {{ secret_name }} in group {{ group_name }}"

- name: Fetch main secret
  include_tasks: fetch_secret.yml
  vars:
    current_secret_name: "{{ secret_name }}"
    result_var: "main_secret"

- name: Set old password and secret details
  set_fact:
    old_password: "{{ main_secret.password }}"
    secret_details_dict:
      site_id: "{{ main_secret.full_json.siteId | default('') }}"
      folder_id: "{{ main_secret.full_json.folderId | default('') }}"
      field_id: >-
        {{ (main_secret.full_json.get('items', [])
             | selectattr('slug', 'equalto', 'password')
             | first).fieldId | default('') }}
      item_id: >-
        {{ (main_secret.full_json.get('items', [])
             | selectattr('slug', 'equalto', 'password')
             | first).itemId | default('') }}
      secret_name: "{{ main_secret.full_json.name | default('') }}"
      secret_id: "{{ main_secret.id }}"
      comment: "Updating password for secret: {{ secret_name }}"

- name: Generate a new random password
  set_fact:
    new_password: "{{ lookup('password', '/dev/null length=16 chars=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_') }}"

- name: Fetch dependent secrets if defined
  block:
    - include_tasks: fetch_dependent_secrets.yml
      vars:
        dependent_list: "{{ user_entry.dependent_secrets }}"
  when: user_entry.dependent_secrets is defined

- name: Set target_host – use user_entry.target_host if provided, else first host in group
  set_fact:
    target_host: "{{ user_entry.target_host | default(groups[group_name][0]) }}"

- name: Append record for {{ secret_name }} in {{ group_name }}
  set_fact:
    password_rotation_items: >-
      {{ password_rotation_items + [ {
          'group': group_name,
          'olam_prefix': hostvars[target_host].olam_prefix,
          'retrieved_password': old_password,
          'generated_password': new_password,
          'password_success': false,
          'secretserver_success': false,
          'user_details': user_entry,
          'secret_details': secret_details_dict,
          'dependent_passwords': dependent_passwords | default({}),
          'apply_success': false,
          'post_success': false,
          'rollback_success': false,
          'rotation_success': false,
          'error_messages': []
        } ] }}
