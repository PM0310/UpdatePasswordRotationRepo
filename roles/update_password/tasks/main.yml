- name: Debug secret_name before API call
  debug:
    msg: "Processing secret_name: {{ user_details.secret_name }} for host {{ inventory_hostname }}"
  run_once: false

- name: Set variables
  set_fact:
    api_url: "{{ secret_server_base_url }}/api/v1/secrets?filter.searchField=name&filter.searchText={{ user_details.secret_name }}"
    
- name: Retrieve matching secrets
  uri:
    url: "{{ api_url }}"
    method: GET
    headers:
      Authorization: "Bearer {{ tkn }}"
    return_content: yes
  register: secrets_found
  delegate_to: localhost

- name: Debug API response
  debug:
    var: secrets_found.json

- name: Find the ID for the specified secret_name
  set_fact:
    found_secret_id: >-
      {{
        secrets_found.json.records | default([]) 
        | selectattr('name', 'equalto', user_details.secret_name) 
        | map(attribute='id') 
        | list 
        | first | default('')
      }}

- name: Debug found_secret_id
  debug:
    msg: "Secret ID found: {{ found_secret_id }} for secret_name: {{ user_details.secret_name }}"

- name: Set api_url to get the secret details from the secret_id
  set_fact:
    api_url2: "{{ secret_server_base_url }}/api/v1/secrets/{{ found_secret_id }}"

- name: Retrieve existing secret
  uri:
    url: "{{ api_url2 }}"
    method: GET
    headers:
      Authorization: "Bearer {{ tkn }}"
    return_content: yes
  register: existing_secret
  delegate_to: localhost

- name: Set siteId, fieldId, itemId for password
  set_fact:
    site_id: "{{ existing_secret.json['siteId'] | default('') }}"
    folder_id: "{{ existing_secret.json['folderId'] | default('') }}"
    field_id: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first | default({})).fieldId | default('') }}"
    item_id: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first | default({})).itemId | default('') }}"
    secret_name_exst: "{{ existing_secret.json['name'] | default('') }}"
    secret_id: "{{ existing_secret.json['id'] | default('') }}"
    comment: "Updating password for secret: {{ user_details.secret_name | default('UNKNOWN') }}"

- name: Debug - Show secret details before update
  debug:
    msg: "Updating Secret Name: {{ secret_name_exst }}, Secret ID: {{ secret_id }} for Group: {{ group_name }}"

- name: Update password
  uri:
    url: "{{ api_url2 }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ tkn }}"
      Content-Type: "application/json"
    body_format: json
    body:
      id: "{{ secret_id }}"
      name: "{{ secret_name_exst }}"
      siteId: "{{ site_id }}"
      folderId: "{{ folder_id }}"
      items:
        - fieldId: "{{ field_id }}"
          itemId: "{{ item_id }}"
          itemValue: "{{ final_password }}"
      active: true
      comment: "{{ comment }}"
    timeout: 30
  register: update_response
  delegate_to: localhost
  # no_log: true
