
- name: Set variables
  set_fact:
    api_url: "{{ secret_server_base_url }}/api/v1/secrets/{{ secret_id }}" 
    # site_id: 1               
    # field_id: 40                 
    # item_id: 253722 
#    item_value: "{{ lookup('password', '/dev/null', length=16, special_chars='@$#*') }}"
    comment: "made changes"
    # folder_Id: 1129
    # secret_name: "SREE"


- name: Request OAuth token
  uri:
    url: "{{ secret_server_base_url }}/oauth2/token"
    method: POST
    headers:
      Content-Type: "application/x-www-form-urlencoded"
    body: 
      username: "{{ secret_server_domain }}\\{{ secret_server_username }}"
      password: "{{ secret_server_password }}"
      grant_type: "password"
    body_format: form-urlencoded
  register: token_response
  # no_log: True


- name: Retrieve existing secret
  uri:
    url: "{{ api_url }}"
    method: GET
    headers:
      Authorization: "Bearer {{ token_response.json.access_token }}"
    return_content: yes
  register: existing_secret


- name: Debug password item
  debug:
    msg: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first) }}"

- name: Set siteId, fieldId, itemId for password
  set_fact:
    site_id: "{{ (existing_secret.json['siteId']) }}"
    folder_id: "{{ (existing_secret.json['folderId']) }}"
    field_id: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first).fieldId }}"
    item_id: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first).itemId }}"


- name: Display the values after setting facts
  debug:
    msg:
      - "API URL: {{ api_url }}"
      - "Site ID: {{ site_id }}"
      - "Field ID: {{ field_id }}"
      - "Folder ID: {{ folder_id }}"
      - "Secret Name: {{ secret_name }}"
      - "Final Password: {{ final_password }}"
      - "Item ID: {{ item_id }}"
      - "Comment: {{ comment }}"


- name: Update password
  uri:
    url: "{{ api_url }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ token_response.json.access_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      id: "{{ secret_id }}"
      name: "{{ secret_name }}"
      siteId: "{{ site_id }}"
      folderId: "{{ folder_id }}"
      items:
        - fieldId: "{{ field_id }}"
          itemId: "{{ item_id }}"
          itemValue: "{{ final_password }}"
      active: true
      comment: "{{ comment }}"
    timeout: 30
  register: update_response
  # no_log: True