
- name: Set variables
  set_fact:
    # api_url: "{{ secret_server_base_url }}/api/v1/secrets/{{ user_details.secret_id }}" 
    # /api/v1/secrets?filter.searchField=name&filter.searchText=<search name>
    # api_url: "{{ secret_server_base_url }}/api/v1/secrets?name={{ user_details.secret_name }}"
    api_url: "{{ secret_server_base_url }}/api/v1/secrets?filter.searchField=name&filter.searchText={{ user_details.secret_name }}"
    comment: "Updating password for secret id {{ user_details.secret_name }}"

- name: Display final password
  debug:
    msg:
      - "Final Password: {{ final_password }}"

- name: Request OAuth token
  uri:
    url: "{{ secret_server_base_url }}/oauth2/token"
    method: POST
    headers:
      Content-Type: "application/x-www-form-urlencoded"
    body: 
      username: "{{ secret_server_domain }}\\{{ secret_server_username }}"
      password: "{{ secret_server_password }}"
      grant_type: "password"
    body_format: form-urlencoded
  register: token_response
  delegate_to: localhost
  no_log: false


- name: Retrieve matching secrets
  uri:
    url: "{{ api_url }}"
    method: GET
    headers:
      Authorization: "Bearer {{ token_response.json.access_token }}"
    return_content: yes
  register: secrets_found
  delegate_to: localhost

- name: Find the first ID for the specified secret_name
  set_fact:

    first_secret_id: "{{ secrets_found.json.records | selectattr('name', 'equalto', secret_name) | map(attribute='id') | list | first }}"


- name: Show the extracted first ID
  debug:
    var: first_secret_id

- name: Set api_url to get the secret details from the id
  set_fact:
    api_url2: "{{ secret_server_base_url }}/api/v1/secrets/{{ first_secret_id }}" 

- name: Retrieve existing secret
  uri:
    url: "{{ api_url2 }}"
    method: GET
    headers:
      Authorization: "Bearer {{ token_response.json.access_token }}"
    return_content: yes
  register: existing_secret
  delegate_to: localhost


- name: Debug password item
  debug:
    msg: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first) }}"

- name: Set siteId, fieldId, itemId for password
  set_fact:
    site_id: "{{ (existing_secret.json['siteId']) }}"
    folder_id: "{{ (existing_secret.json['folderId']) }}"
    field_id: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first).fieldId }}"
    item_id: "{{ (existing_secret.json['items'] | selectattr('slug', 'equalto', 'password') | first).itemId }}"
    secret_name: "{{ existing_secret.json['name'] }}"
    secret_id: "{{ existing_secret.json['id'] }}"
    comment: "Updating password for secret :   {{ secret_name }}"


- name: Display the values after setting facts
  debug:
    msg:
      - "API URL: {{ api_url2 }}"
      - "Site ID: {{ site_id }}"
      - "Field ID: {{ field_id }}"
      - "Folder ID: {{ folder_id }}"
      - "Secret Name: {{ secret_name }}"
      - "Secret id: {{ secret_id }}"
      - "Final Password: {{ final_password }}"
      - "Item ID: {{ item_id }}"
      - "Comment: {{ comment }}"


- name: Update password
  uri:
    url: "{{ api_url2 }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ token_response.json.access_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      id: "{{ secret_id }}"
      name: "{{ secret_name }}"
      siteId: "{{ site_id }}"
      folderId: "{{ folder_id }}"
      items:
        - fieldId: "{{ field_id }}"
          itemId: "{{ item_id }}"
          itemValue: "{{ final_password }}"
      active: true
      comment: "{{ comment }}"
    timeout: 30
  register: update_response
  delegate_to: localhost
  # no_log: True