- name: Initialize updated_items list
  set_fact:
    updated_items: []

- name: Loop through items with successful DB rotation
  loop: "{{ password_rotation_items }}"
  loop_control:
    loop_var: rotation_item
  when: rotation_item.password_success | default(false)
  block:

    - name: Initialize secretserver flags
      set_fact:
        secretserver_success: false
        error_msg_secret: ''

    - name: Set API URL for secret update
      set_fact:
        api_url2: "{{ secret_server_base_url }}/api/v1/secrets/{{ rotation_item.user_details.secret_name }}"  # adjust path or include ID if needed

    - name: Update Secret Server with the new password
      uri:
        url: "{{ api_url2 }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ tkn }}"
          Content-Type: "application/json"
        body_format: json
        body:
          id: "{{ rotation_item.secret_id }}"
          name: "{{ rotation_item.user_details.secret_name }}"
          siteId: "{{ rotation_item.site_id }}"
          folderId: "{{ rotation_item.folder_id }}"
          items:
            - fieldId: "{{ rotation_item.field_id }}"
              itemId: "{{ rotation_item.item_id }}"
              itemValue: "{{ rotation_item.generated_password }}"
          active: true
          comment: "{{ rotation_item.comment | default('Password rotated on ' + ansible_date_time.iso8601) }}"
      register: update_response
      delegate_to: localhost
      failed_when: update_response.status not in [200, 201, 204]

    - name: Mark secret server update as successful
      set_fact:
        secretserver_success: true

  rescue:
    - name: Capture secret server failure
      set_fact:
        secretserver_success: false
        error_msg_secret: "{{ ansible_failed_result.msg | default(ansible_failed_result.stderr) }}"

  always:
    - name: Append rotation_item with secretserver status
      set_fact:
        updated_items: >-
          {{ updated_items + [ rotation_item
              | combine({
                  'secretserver_success': secretserver_success,
                  'error_msg_secret': error_msg_secret
                }) ] }}

- name: Expose final password_rotation_items
  set_fact:
    password_rotation_items: "{{ updated_items }}"
