---
- block:

    - name: Initialize Secret Server status
      set_fact:
        secretserver_success: false
        error_msg_secret: ""

    #################################################################
    # Search Secret
    #################################################################

    - name: Search Secret by name
      uri:
        url: "{{ secret_server_base_url }}/api/v1/secrets?filter.searchText={{ secret_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ tkn }}"
      register: secret_lookup
      delegate_to: localhost

    - name: Verify Secret exists
      fail:
        msg: "Secret '{{ secret_name }}' not found."
      when: secret_lookup.json['records'] | length == 0

    - name: Store Secret summary
      set_fact:
        secret_summary: "{{ secret_lookup.json['records'][0] }}"

    #################################################################
    # Get complete secret
    #################################################################

    - name: Get complete Secret details
      uri:
        url: "{{ secret_server_base_url }}/api/v1/secrets/{{ secret_summary['id'] }}"
        method: GET
        headers:
          Authorization: "Bearer {{ tkn }}"
      register: secret_response
      delegate_to: localhost

    - name: Store complete Secret details
      set_fact:
        secret_details: "{{ secret_response.json }}"

    #################################################################
    # Find password field
    #################################################################

    - name: Find password field
      set_fact:
        password_item: >-
          {{
            secret_details['items']
            | selectattr('slug', 'equalto', 'password')
            | first
          }}

    #################################################################
    # Update Secret Server
    #################################################################

    - name: Build Secret Server URL
      set_fact:
        api_url: "{{ secret_server_base_url }}/api/v1/secrets/{{ secret_details['id'] }}"

    - name: Update Secret Server
      uri:
        url: "{{ api_url }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ tkn }}"
          Content-Type: "application/json"
        body_format: json
        body:
          id: "{{ secret_details['id'] }}"
          name: "{{ secret_details['name'] }}"
          siteId: "{{ secret_details['siteId'] }}"
          folderId: "{{ secret_details['folderId'] }}"
          items:
            - fieldId: "{{ password_item['fieldId'] }}"
              itemId: "{{ password_item['itemId'] }}"
              itemValue: "{{ final_password1 }}"
          active: "{{ secret_details['active'] }}"
          comment: ""
      register: update_response
      delegate_to: localhost
      until: update_response.status in [200, 201, 204]
      retries: 3
      delay: 5
      failed_when: update_response.status not in [200, 201, 204]

    - name: Mark Secret Server update successful
      set_fact:
        secretserver_success: true

  rescue:

    - name: Capture Secret Server failure
      set_fact:
        secretserver_success: false
        error_msg_secret: "{{ ansible_failed_result.msg | default('Secret Server update failed') }}"
