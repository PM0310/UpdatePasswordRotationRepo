- name: Initialize updated_items list
  set_fact:
    updated_items: []

- name: Loop through items with successful DB rotation
  loop: "{{ password_rotation_items }}"
  loop_control:
    loop_var: rotation_item
  when: rotation_item.password_success | default(false)
  
- name: Expose final password_rotation_items
  set_fact:
    password_rotation_items: "{{ updated_items }}"
