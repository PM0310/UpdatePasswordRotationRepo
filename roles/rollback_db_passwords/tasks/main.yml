- name: Initialize updated_items list
  set_fact:
    updated_items: []

- name: Loop through each password rotation item
  loop: "{{ password_rotation_items }}"
  loop_control:
    loop_var: rotation_item
  vars:
    group_hosts: "{{ groups[rotation_item.group] }}"
  include_tasks: rotate_on_host.yml
  when: rotation_item.password_success is false or rotation_item.secretserver_success is false

- name: Loop through each password rotation item
  loop: "{{ password_rotation_items }}"
  loop_control:
    loop_var: rotation_item
  set_fact:
    updated_items: >-
          {{ updated_items + [ rotation_item ] }}
  when: rotation_item.password_success and rotation_item.secretserver_success

- name: Add back items that were not processed
  set_fact:
    updated_items: "{{ updated_items + [item] }}"
  loop: "{{ password_rotation_items }}"
  loop_control:
    loop_var: item
  when: item not in updated_items

