- name: Get limited groups
  hosts: all
  tasks:
    - set_fact:
        val: false

    - name: Attempt to print limited groups
      block:
        - name: Print limited groups
          debug:
            msg: "Limited groups are: {{ limited_groups }}"
      rescue:
        - set_fact:
            val: true

    - name: Print val (to check if rescue triggered)
      debug:
        msg: "Rescue triggered: {{ val }}"

    - name: Print group variables
      debug:
        msg: "{{ groups['Cen_NonProd_APP'][0].user }}"
