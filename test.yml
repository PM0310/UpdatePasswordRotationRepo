---
- name: Print OLAM Creds
  hosts: localhost
  gather_facts: no
  run_once: true

  vars_files:
    - config/{{ instance }}.yaml

  tasks:
    - name: OLAM Credentials
      debug:
    	msg:
          - "TGT_APPS_PASS={{ TGT_APPS_PASS | default('') }}"
          - "TGT_SYSTEM_PASS={{ TGT_SYSTEM_PASS | default('') }}"
          - "TGT_WEBLOGIC_PASS={{ TGT_WEBLOGIC_PASS | default('') }}"
          - "TGT_APPS_PASS_GEN={{ TGT_APPS_PASS_GEN | default('') }}"
