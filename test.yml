---
# roles/password_rotation_role1/tasks/main.yml
- name: "🔍 1) Determine which inventory groups were limited"
  hosts: all
  gather_facts: false
  run_once: true
  tasks:
    - name: Initialize target_groups list
      set_fact:
        target_groups: []

    # - name: Identify groups containing any of the limited hosts
    #   vars:
    #     all_groups: "{{ groups.keys() | difference(['all']) | list }}"
    #   loop: "{{ all_groups }}"
    #   loop_control:
    #     loop_var: candidate_group
    #   set_fact:
    #     target_groups: "{{ target_groups + [ candidate_group ] }}"
    #   when: "(groups[candidate_group] | intersect(ansible_play_batch) | length) > 0"

    - name: Normalize ansible_limit and extract valid groups
      set_fact:
        target_groups: "{{ ansible_limit.split(',') | map('trim') | list }}"
      when: ansible_limit is defined

    - name: Fallback to all group prefixes if ansible_limit not defined
      set_fact:
        target_groups: "{{ users | map(attribute='secret_name') | map('regex_replace', '^(.*?)_.*', '\\1') | unique | list }}"
      when: ansible_limit is not defined

    - name: Debug – show target groups
      debug:
        var: target_groups

    - name: "🔄 2) Initialize password_rotation_items list"
      set_fact:
        password_rotation_items: []

    - name: "🔄 3) Rotate passwords for each target group"
      include_tasks: rotate_group.yml
      loop: "{{ target_groups }}"
      loop_control:
        loop_var: group_name
      vars:
        group_users: "{{ hostvars[ groups[group_name][0] ].users | default([]) }}"

    - name: Debug – final password_rotation_items
      debug:
        var: password_rotation_items

    - name: Make password_rotation_items available to later roles
      set_fact:
        password_rotation_items: "{{ password_rotation_items }}"


