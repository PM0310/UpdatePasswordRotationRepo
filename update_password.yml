    - name: Retrieve the secret
      uri:
        url: "{{ api_url }}" #url: "{{ secret_server_url }}/secrets/{{ secret_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ token }}"
          Content-Type: "application/json"
      register: get_secret_response
      failed_when: get_secret_response.status != 200 

    - name: Update the secret's name
      uri:
        url: "{{ api_url }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          id: 18830
          name: "{{ secret_name }}"
          siteId: "{{ site_id }}"
          items:
            - fieldId: "{{ field_id }}"
              itemId: "{{ item_id }}"
              itemValue: "{{ item_value }}"
          active: true
          comment: "{{ comment }}"
        timeout: 30
        validate_certs: no  # Use `yes` in production with proper SSL setup
      register: update_response
    - debug:
        msg: "{{ update_response.json.items }}" 

    - debug:
        msg: "Updated Secret Name is now {{ item.itemValue }}"
      loop: "{{ update_response.json.items }}"
      loop_control:
        loop_var: item
      when: item.slug == 'password'

