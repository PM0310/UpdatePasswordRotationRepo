---
- name: Resolve generated password
  set_fact:
    final_password: >-
      {{
        lookup(
          'vars',
          hostvars[rotation_item.target_host].olam_fields.apps_pass_gen
        )
      }}

- name: Update Secret Server
  include_role:
    name: update_password
  vars:
    secret_name: >-
      {{
        (
          hostvars[rotation_item.target_host].users
          | selectattr('user','equalto','APPS')
          | first
        ).secret_name
      }}
    final_password: "{{ final_password }}"

- name: Update workflow state
  set_fact:
    updated_items: >-
      {{
        updated_items +
        [
          rotation_item |
          combine({
            'secretserver_success': secretserver_success,
            'error_msg_secret': error_msg_secret
          })
        ]
      }}
