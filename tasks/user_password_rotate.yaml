- name: Debug - Show group being processed
  debug:
    msg: "Processing password rotation for group: {{ group_name }}"

- name: Get the user details from inventory variables
  set_fact:
    user_details:
      username: "{{ users[0].secret_name.split('_')[-1] | lower }}"
      email_recipients: "{{ users[0].email_recipients | default([]) }}"
      secret_name: "{{ users[0].secret_name }}"

- name: Debug - Show extracted user details
  debug:
    msg: "Group: {{ group_name }}, Username: {{ user_details.username }}, Email Recipients: {{ user_details.email_recipients }}"

- name: Apply password change to all hosts in the group
  set_fact:
    final_pwd: "{{ hostvars['global_passwords'].group_pwds[group_name] }}"

- name: Debug - Show final password for the group
  debug:
    msg: "Final password for group {{ group_name }}: {{ final_pwd }}"

- name: Update password on target hosts
  shell: echo "{{ final_pwd }}" | passwd --stdin {{ user_details.username }}
  become: yes
  delegate_to: "{{ item }}"
  loop: "{{ groups[group_name] }}"

- name: Retrieve secret ID dynamically
  uri:
    url: "{{ secret_server_base_url }}/api/v1/secrets?filter.searchField=name&filter.searchText={{ user_details.secret_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ tkn }}"
    return_content: yes
  register: secrets_found
  delegate_to: localhost

- name: Extract secret ID
  set_fact:
    secret_id: "{{ secrets_found.json.records | selectattr('name', 'equalto', user_details.secret_name) | map(attribute='id') | list | first | default('Unknown') }}"

- name: Debug - Show secret ID before updating Secret Server
  debug:
    msg: "Updating Secret Name: {{ user_details.secret_name }}, Secret ID: {{ secret_id }} for Group: {{ group_name }}"

- name: Update password in Secret Server
  include_role:
    name: update_password
  vars:
    secret_name: "{{ user_details.secret_name }}"
    final_password: "{{ final_pwd }}"

- name: Send Email Notification
  community.general.mail:
    host: "{{ smtp_server }}"
    port: "{{ smtp_port }}"
    from: "{{ email_sender }}"
    to: "{{ user_details.email_recipients | join(', ') }}"
    subject: "Password Rotation - Group: {{ group_name }}"
    body: |
      Hi,

      The password for the following user has been successfully rotated:

      **Group**: {{ group_name }}
      **Hosts**: {{ groups[group_name] | join(', ') }}
      **User**: {{ user_details.username }}
      **Secret Name**: {{ user_details.secret_name }}
      **Secret ID**: {{ secret_id }}
      **URL**: https://centroid.secretservercloud.com/app/#/secrets/{{ secret_id }}/general

      Thanks & Regards,
      Automation Team
  delegate_to: localhost
  run_once: true
