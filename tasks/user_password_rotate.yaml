- name: Generate a random password
  set_fact:
    final_password: "{{ lookup('password', '/dev/null', length=16, special_chars='@$#*') }}"
    cacheable: true
  delegate_to: localhost
  no_log: true


- name: Reset password for user
  shell: echo "{{ final_password }}" | passwd --stdin {{ user_details.username }}
  become: yes
  no_log: false

- name: Register host and user
  set_fact:
    host_result:
      host: "{{ inventory_hostname }}"
      user: "{{ user_details.username }}"

- name: Share final_password with localhost
  set_fact:
    final_pass: "{{ final_password }}"
  delegate_to: localhost
  # run_once: true
  no_log: true


- name: Update password in Secret Server
  include_role:
    name: update_password
  vars:
    final_password: "{{ final_pass }}"
    secret_name: "{{ user_details.secret_name }}"
  # run_once: true


