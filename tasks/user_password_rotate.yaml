- name: Debug - Show group being processed
  debug:
    msg: "Processing password rotation for group: {{ group_name }}"

- name: Retrieve users from hostvars for group {{ group_name }}
  set_fact:
    group_users: "{{ hostvars[inventory_hostname].users | selectattr('secret_name', 'defined') | list }}"

- name: Debug - Show extracted users
  debug:
    msg: "Users in group {{ group_name }}: {{ group_users }}"

- name: Extract user details for group {{ group_name }}
  set_fact:
    user_details:
      username: "{{ group_users[0].secret_name.split('_')[-1] | lower }}"
      email_recipients1: "{{ group_users[0].email_recipients | default([]) }}"
      secret_name1: "{{ group_users[0].secret_name }}"

- name: Debug - Show extracted user details
  debug:
    msg: "Group: {{ group_name }}, Username: {{ user_details.username }}, Secret Name: {{ user_details.secret_name1 }}, Email Recipients: {{ user_details.email_recipients1 }}"

- name: Apply password change to all hosts in the group
  set_fact:
    final_pwd: "{{ hostvars['global_passwords'].group_pwds[group_name] }}"

- name: Debug - Show final password for the group
  debug:
    msg: "Final password for group {{ group_name }}: {{ final_pwd }}"

- name: Update password on target hosts
  shell: echo "{{ final_pwd }}" | passwd --stdin {{ user_details.username }}
  become: yes
  delegate_to: "{{ item }}"
  loop: "{{ groups[group_name] }}"

- name: Retrieve matching secrets for group {{ group_name }}
  uri:
    url: "{{ secret_server_base_url }}/api/v1/secrets?filter.searchField=name&filter.searchText={{ user_details.secret_name1 }}"
    method: GET
    headers:
      Authorization: "Bearer {{ tkn }}"
    return_content: yes
  register: secrets_found
  delegate_to: localhost

- name: Find the ID for the specified secret_name for group {{ group_name }}
  set_fact:
    found_secret_id: "{{ secrets_found.json.records | selectattr('name', 'equalto', user_details.secret_name1) | map(attribute='id') | list | first }}"

- name: Debug - Show secret ID before updating Secret Server
  debug:
    msg: "Updating Secret Name: {{ user_details.secret_name1 }}, Secret ID: {{ found_secret_id }} for Group: {{ group_name }}"

- name: Update password in Secret Server
  include_role:
    name: update_password
  vars:
    secret_name: "{{ user_details.secret_name1 }}"
    final_password: "{{ final_pwd }}"
    secret_id: "{{ found_secret_id }}"

- name: Send Email Notification
  community.general.mail:
    host: "{{ smtp_server }}"
    port: "{{ smtp_port }}"
    from: "{{ email_sender }}"
    to: "{{ user_details.email_recipients1 | join(', ') }}"
    subject: "Password Rotation - Group: {{ group_name }}"
    body: |
      Hi,

      The password for the following user has been successfully rotated:

      **Group**: {{ group_name }}
      **Hosts**: {{ groups[group_name] | join(', ') }}
      **User**: {{ user_details.username }}
      **Secret Name**: {{ user_details.secret_name1 }}
      **Secret ID**: {{ found_secret_id }}
      **URL**: https://centroid.secretservercloud.com/app/#/secrets/{{ found_secret_id }}/general

      Thanks & Regards,
      Automation Team
  delegate_to: localhost
  run_once: true
