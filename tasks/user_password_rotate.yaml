- name: Generate a random password
  set_fact:
    final_password: "{{ lookup('password', '/dev/null', length=16, special_chars='@$#*') }}"
    cacheable: true
  delegate_to: localhost
  # no_log: true


- name: Reset password for user
  shell: echo "{{ final_password }}" | passwd --stdin {{ user_details.username }}
  become: yes
  no_log: false

- name: Register host and user
  set_fact:
    host_result:
      host: "{{ inventory_hostname }}"
      user: "{{ user_details.username }}"

- name: Share final_password with localhost
  set_fact:
    final_pass: "{{ final_password }}"
  delegate_to: localhost
  # run_once: true
  # no_log: true


- name: Get users list from the inventory group the host belongs to
  set_fact:
    users_list: "{{ hostvars[inventory_hostname]['users'] | default([]) }}"

- name: Set secret_name dynamically based on the user's inventory group
  set_fact:
    secret_name: "{{ users_list[0].secret_name | default('UNKNOWN_SECRET') }}"

- name: Debug secret_name before API call
  debug:
    msg: "Processing secret_name: {{ secret_name }} for host {{ inventory_hostname }}"

- name: Update password in Secret Server
  include_role:
    name: update_password
  vars:
    final_password: "{{ final_pass }}"
    secret_name: "{{ user_details.secret_name }}"
  # run_once: true



- name: Create a mapping of hosts to secret names dynamically
  set_fact:
    secret_name: "{{ item.secret_name }}"
  with_items: "{{ users }}"
  when: item.host is defined and item.host == inventory_hostname



- name: Set secret_name dynamically based on the host's group
  set_fact:
    secret_name: "{{ users[0].secret_name | default('UNKNOWN_SECRET') }}"

# - name: Set secret_name dynamically
#   set_fact:
#     secret_name: "{{ users | selectattr('host', 'equalto', inventory_hostname) | map(attribute='secret_name') | first | default('UNKNOWN_SECRET') }}"

- name: Debug secret_name before API call
  debug:
    msg: "Processing secret_name: {{ secret_name }} for host {{ inventory_hostname }}"

 
- name: Store password rotation details globally
  set_fact:
    password_reset_results_global: >-
      {{
        hostvars['localhost'].password_reset_results_global | default([]) +
        [
          {
            'host': inventory_hostname,
            'user': user_details.username | default('UNKNOWN_USER'),
            'secret_name': secret_name | default('UNKNOWN_SECRET'),
            'secret_id': secret_id | default('UNKNOWN_SECRET_ID')
          }
        ]
        | unique
      }}
  delegate_to: localhost
  delegate_facts: true
  run_once: true


- name: Debug password_reset_results_global
  debug:
    var: hostvars['localhost'].password_reset_results_global
  delegate_to: localhost
  run_once: true



- name: Send an individual email for each host
  community.general.mail:
    host: "{{ smtp_server }}"
    port: "{{ smtp_port }}"
    from: "{{ email_sender }}"
    to: "{{ user_details.email_recipients | join(', ') }}"
    subject: "Password Rotation - {{ inventory_hostname }}"
    body: |
      Hi,

      The password for the following user has been successfully rotated:

      Host: {{ inventory_hostname }} 
      User: {{ user_details.username }} 
      Secret Name: {{ secret_name }} 
      Secret ID: {{ secret_id }}
      URL: https://centroid.secretservercloud.com/app/#/secrets/{{ secret_id }}/general

      Thanks & Regards,
      Automation Team
  delegate_to: localhost
  run_once: false






