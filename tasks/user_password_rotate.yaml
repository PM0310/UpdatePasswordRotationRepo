- name: Store password rotation details per host
  set_fact:
    password_reset_results: "{{ password_reset_results | default([]) + [
      {
        'host': inventory_hostname,
        'user': user_details.username,
        'secret_name': user_details.secret_name,
        'secret_id': secret_id
      }
    ] }}"
  delegate_to: localhost
  delegate_facts: true
  run_once: false





