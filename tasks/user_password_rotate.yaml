- name: Store password rotation details globally
  set_fact:
    password_reset_results_global: >-
      {{
        hostvars['localhost'].password_reset_results_global | default([]) +
        [
          {
            'host': inventory_hostname,
            'user': user_details.username | default('UNKNOWN_USER'),
            'secret_name': secret_name | default('UNKNOWN_SECRET'),
            'secret_id': secret_id | default('UNKNOWN_SECRET_ID')
          }
        ]
        | unique
      }}
  delegate_to: localhost
  delegate_facts: true
  run_once: false


- name: Debug password_reset_results_global
  debug:
    var: hostvars['localhost'].password_reset_results_global
  delegate_to: localhost
  run_once: true



- name: Send an individual email for each host
  community.general.mail:
    host: "{{ smtp_server }}"
    port: "{{ smtp_port }}"
    from: "{{ email_sender }}"
    to: "{{ user_details.email_recipients | join(', ') }}"
    subject: "Password Rotation - {{ inventory_hostname }}"
    body: |
      Hi,

      The password for the following user has been successfully rotated:

      Host: {{ inventory_hostname }} 
      User: {{ user_details.username }} 
      Secret Name: {{ secret_name }} 
      Secret ID: {{ secret_id }}
      URL: https://centroid.secretservercloud.com/app/#/secrets/{{ secret_id }}/general

      Thanks & Regards,
      Automation Team
  delegate_to: localhost
  run_once: false

