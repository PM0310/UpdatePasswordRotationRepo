- name: Debug - Show stored passwords dictionary
  debug:
    var: hostvars['global_passwords'].group_pwds
  run_once: true
  no_log: true  # Hide passwords in logs

- name: Debug - Show group being processed
  debug:
    msg: "Processing password rotation for group: {{ group_name }}"

- name: Retrieve users from a valid host in the group {{ group_name }}
  set_fact:
    reference_host: "{{ groups[group_name] | first }}"

- name: Debug - Show reference host for {{ group_name }}
  debug:
    msg: "Using {{ reference_host }} to fetch users for group {{ group_name }}"

- name: Retrieve users from hostvars for group {{ group_name }}
  set_fact:
    group_users: "{{ hostvars[reference_host].users | selectattr('secret_name', 'defined') | list }}"

- name: Ensure group_users is not empty before proceeding
  fail:
    msg: "No valid users found for group {{ group_name }}. Check inventory configuration."
  when: group_users | length == 0

- name: Extract user details for group {{ group_name }}
  set_fact:
    user_details:
      username: "{{ group_users[0].secret_name.split('_')[-1] | lower }}"
      email_recipients: "{{ group_users[0].email_recipients | default([]) }}"
      secret_name: "{{ group_users[0].secret_name }}"

- name: Debug - Show extracted user details
  debug:
    msg: "Group: {{ group_name }}, Username: {{ user_details.username }}, Secret Name: {{ user_details.secret_name }}, Email Recipients: {{ user_details.email_recipients }}"


####new

- name: Store group_name globally before calling fetch_existing_secret00
  set_fact:
    global_group_name: "{{ group_name }}"


- name: Fetch secret server id and pass
  include_role:
    name: fetch_existing_secret00
  vars:
    secret_name: "{{ user_details.secret_name }}"
    group_name: "{{ global_group_name }}"


- name: Debug item_value
  debug:
    msg: "The password in Secret Server before the update is: {{ item_value }}"


- name: Save old password from Secret Server
  set_fact:
    old_item_value: "{{ item_value }}"


####new



- name: Apply password change to all hosts in the group
  set_fact:
    # final_pwd: "{{ hostvars['global_passwords'].group_pwds[group_name] }}"
    final_pwd: "Centroid1"
  # no_log: true  # Hide passwords in logs

- name: Debug - Show final password for the group
  debug:
    msg: "Final password for group {{ group_name }}: {{ final_pwd }}"
  # no_log: true  # Hide passwords in logs

- name: Update password on target hosts
  shell: echo "{{ final_pwd }}" | passwd --stdin {{ user_details.username }}
  become: yes
  delegate_to: "{{ item }}"
  loop: "{{ groups[group_name] }}"
  # no_log: true  # Hide passwords in logs

# - name: Store group_name globally before calling update_secret_server
#   set_fact:
#     global_group_name: "{{ group_name }}"


- name: Debug - Show group being processed before updating Secret Server
  debug:
    msg: "Processing group: {{ global_group_name }}, using secret: {{ user_details.secret_name }}"



- name: Update password in Secret Server
  include_role:
    name: update_secret_server
  vars:
    secret_name: "{{ user_details.secret_name }}"
    final_password: "{{ final_pwd }}"
    group_name: "{{ global_group_name }}"


- name: Fetch secret server id and pass again after the update
  include_role:
    name: fetch_existing_secret00
  vars:
    secret_name: "{{ user_details.secret_name }}"
    group_name: "{{ global_group_name }}"


- name: Debug item_value
  debug:
    msg: "The password in Secret Server after the update is: {{ item_value }}"


- name: Set password update status
  set_fact:
    password_update_status: >-
      {% if old_item_value == item_value %}
        "failed"
      {% else %}
        "failed"
      {% endif %}


- name: Take action based on password update result
  debug:
    msg: "Password update was successful!"
  when: password_update_status == "success"

- name: Revert password or log failure
  debug:
    msg: "Password update failed. Reverting..."
  when: password_update_status == "failed"

- name: Debug old and new values
  debug:
    msg: "Old: {{ old_item_value }}, New: {{ item_value }}, Status: {{ password_update_status }}"




- name: Revert password rotation on target hosts
  shell: echo "{{ old_item_value }}" | passwd --stdin {{ user_details.username }}
  become: yes
  delegate_to: "{{ item }}"
  loop: "{{ groups[group_name] }}"
  when: password_update_status == "failed"


- name: Notify that password rotation has been reverted
  debug:
    msg: "Password rotation reverted to old value on all target hosts in group '{{ group_name }}'."
  when: password_update_status == "failed"


